<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Scelta della modalità di lavoro</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preload" href="cards/retro.jpg" as="image">
</head>
<body>
  <header>
    <div class="toggle-container">
      <button id="theme-toggle">🌙</button>
    </div>
  </header>

  <main class="centered">
    <h1>Scegli la modalità di lavoro:</h1>
    <div class="button-group">
      <button id="covered">Carte coperte</button>
      <button id="exposed">Carte scoperte</button>
    </div>
  </main>

  <!-- Loader visivo -->
  <div id="loader" class="loader-container">
    <div class="loader"></div>
    <p id="loader-text">Caricamento carte in corso...</p>
  </div>

  <script src="theme.js" defer></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const loader = document.getElementById('loader');
	  loader.style.display = 'none';
      const loaderText = document.getElementById('loader-text');
      const coveredBtn = document.getElementById('covered');
      const exposedBtn = document.getElementById('exposed');

      async function imageExists(src) {
        return new Promise(resolve => {
          const img = new Image();
          img.onload = () => resolve(true);
          img.onerror = () => resolve(false);
          img.src = src;
        });
      }

      async function detectCatalog(maxIndex = 500, missLimit = 10, timeout = 100000) {
        const found = [];
        let misses = 0;
        let i = 1;
        const startTime = Date.now();

        while (i <= maxIndex && misses < missLimit) {
          if (Date.now() - startTime > timeout) {
            console.warn('Timeout raggiunto durante il rilevamento del catalogo');
            break;
          }

          loaderText.textContent = `Verifica carta ${i}...`;

          const jpg = await imageExists(`cards/carta${i}.jpg`);
          if (jpg) {
            found.push({ i, ext: '.jpg' });
            misses = 0;
            i++;
            continue;
          }else{
			const png = await imageExists(`cards/carta${i}.png`);
			if (png) {
			  found.push({ i, ext: '.png' });
			  misses = 0;
			  i++;
			  continue;
			}
		  }
          misses++;
          i++;
        }

        return found;
      }
	  
      async function detectCatalogParallel(maxIndex = 500, timeout = 100000) {
        const startTime = Date.now();
      
        const tasks = Array.from({ length: maxIndex }, (_, idx) => {
          const i = idx + 1;
          return (async () => {
            if (Date.now() - startTime > timeout) return null;
      
            const jpg = await imageExists(`cards/carta${i}.jpg`);
            if (jpg) return { i, ext: '.jpg' };
      
            const png = await imageExists(`cards/carta${i}.png`);
            if (png) return { i, ext: '.png' };
      
            return null;
          })();
        });
      
        const results = await Promise.allSettled(tasks);
        return results
          .map(r => r.status === 'fulfilled' ? r.value : null)
          .filter(Boolean);
      }
	  
	  
      async function startWithMode(mode) {
        location.href = `cards.html?mode=${mode}`;
      }

      async function loadcatalog() {
        loader.style.display = 'flex';
        sessionStorage.clear();
        const catalog = await detectCatalogParallel();
        if (catalog.length === 0) {
          loader.style.display = 'none';
          alert('Nessuna carta trovata. Verifica la cartella "cards/"');
          return;
        }
        sessionStorage.setItem('catalog_preload', JSON.stringify(catalog));
        console.log(`Catalogo precaricato: ${catalog.length} carte trovate`);
        loader.style.display = 'none';
      }

	  loadcatalog();
      coveredBtn.addEventListener('click', () => startWithMode('covered'));
      exposedBtn.addEventListener('click', () => startWithMode('exposed'));
    });
  </script>
</body>
</html>
